name: Hyundai Update Monitor

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# 전역 변수 설정: 여기서 브랜드, 차량번호, 소유주를 수정하세요
env:
  CAR_BRAND: '브랜드' # <--- [브랜드 입력] 예: 현대, 기아, 제네시스
  CAR_NO: '차량번호' # <--- [차량번호 입력] 예: 12가3456
  CAR_OWNER: '소유주' # <--- [소유주 입력] 예: 홍길동
  STATE_FILE: 'last_update.txt'

jobs:
  check-and-report:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Get Playwright Version
        id: playwright-version
        run: echo "VERSION=$(pnpm list --depth 0 @playwright/test --json | jq -r '.[0].dependencies["@playwright/test"].version')" >> $GITHUB_OUTPUT

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.VERSION }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium

      - name: Install Playwright System Deps
        run: pnpm exec playwright install-deps chromium

      - name: Run Scraper & Compare
        id: monitor
        run: |
          # 상태 파일에서 이전 업데이트 날짜만 읽기
          LAST_DATE=$([ -f "${{ env.STATE_FILE }}" ] && grep '^update_date=' ${{ env.STATE_FILE }} | cut -d'=' -f2 || echo "기록 없음")

          set +e
          RAW_OUTPUT=$(node scraper.js "${{ env.CAR_BRAND }}" "${{ env.CAR_NO }}" "${{ env.CAR_OWNER }}" 2>&1)
          EXIT_CODE=$?
          set -e

          if [ $EXIT_CODE -ne 0 ]; then
            ERROR_LINE=$(echo "$RAW_OUTPUT" | grep -E '🚨|❌' | tail -1 | sed 's/"/\\"/g')
            echo "ERROR_MSG=${ERROR_LINE:-알 수 없는 에러가 발생했습니다.}" >> $GITHUB_OUTPUT
            echo "LAST=$LAST_DATE" >> $GITHUB_OUTPUT
            exit 1
          fi

          CURRENT_DATE=$(echo "$RAW_OUTPUT" | grep -oE "[0-9]{2}년 [0-9]{1,2}월" | head -n 1 || echo "데이터 없음")

          if [ "$CURRENT_DATE" != "데이터 없음" ] && [ "$CURRENT_DATE" != "$LAST_DATE" ]; then
            echo "CHANGED=true" >> $GITHUB_OUTPUT
            echo "MSG=✨ 새 업데이트 발견!" >> $GITHUB_OUTPUT
          else
            echo "CHANGED=false" >> $GITHUB_OUTPUT
            echo "MSG=✅ 변동 없음 (유지 중)" >> $GITHUB_OUTPUT
          fi

          echo "CURRENT=$CURRENT_DATE" >> $GITHUB_OUTPUT
          echo "LAST=$LAST_DATE" >> $GITHUB_OUTPUT

          # 매 실행마다 두 값 모두 갱신 — last_checked가 매일 바뀌어 repo 활성 상태 유지
          printf "update_date=%s\nlast_checked=%s\n" "$CURRENT_DATE" "$(date -u +%Y-%m-%d)" > ${{ env.STATE_FILE }}

      - name: Commit State File
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.STATE_FILE }}
          if git diff --cached --quiet; then
            echo "No changes to commit, skipping."
          else
            git commit -m "chore: 업데이트 확인 ($(date -u +%Y-%m-%d))"
            git push
          fi

      - name: Send Slack Notification (Error)
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🚨 *${{ env.CAR_BRAND }} 내비게이션 업데이트 체크 - 에러 발생*\n\n*에러 내용:*\n${{ steps.monitor.outputs.ERROR_MSG }}\n\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|🔗 GitHub Actions 로그 확인>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Send Slack Notification (Normal)
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🔍 *${{ env.CAR_BRAND }} 내비게이션 업데이트 체크*\n*차량:* ${{ env.CAR_NO }} (${{ env.CAR_OWNER }})\n*상태:* ${{ steps.monitor.outputs.MSG }}\n\n• *이전 데이터:* ${{ steps.monitor.outputs.LAST }}\n• *현재 데이터:* ${{ steps.monitor.outputs.CURRENT }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
